<!DOCTYPE html>
<html>
<head>
  <title>キャッシュクリア</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f8fafc; }
    .container { text-align: center; padding: 2rem; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; margin: 1rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success { color: #16a34a; }
    .info { color: #64748b; font-size: 14px; margin-top: 0.5rem; }
  </style>
</head>
<body>
<div class="container">
  <div class="spinner" id="spinner"></div>
  <h2 id="status">キャッシュをクリア中...</h2>
  <p class="info" id="detail"></p>
</div>
<script>
  async function clearAll() {
    const detail = document.getElementById('detail');
    const status = document.getElementById('status');
    const spinner = document.getElementById('spinner');
    let steps = [];
    try {
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const reg of regs) {
          await reg.unregister();
          steps.push('Service Worker を削除');
        }
      }
      if ('caches' in window) {
        const names = await caches.keys();
        for (const name of names) {
          await caches.delete(name);
          steps.push('キャッシュ "' + name + '" を削除');
        }
      }
      localStorage.clear();
      sessionStorage.clear();
      steps.push('ストレージをクリア');
      spinner.style.display = 'none';
      status.textContent = 'クリア完了！';
      status.className = 'success';
      detail.innerHTML = steps.map(s => '✓ ' + s).join('<br>') + '<br><br>3秒後にリダイレクトします...';
      setTimeout(() => { window.location.href = '/?v=' + Date.now(); }, 3000);
    } catch (e) {
      spinner.style.display = 'none';
      status.textContent = 'エラーが発生しました';
      detail.textContent = e.message;
    }
  }
  clearAll();
</script>
</body>
</html>
