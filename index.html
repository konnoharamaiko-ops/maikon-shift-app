<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-testb-32.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-testb-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- PWA対応メタタグ -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="シフト管理(テストB)">
    <meta name="theme-color" content="#ffffff">
    <title>舞昆シフト提出アプリ(テストB)</title>
    
    <!-- Service Worker キャッシュ強制クリア -->
    <script>
      // 古いService Workerのキャッシュを強制クリアして白い画面を防止
      if ('serviceWorker' in navigator && 'caches' in window) {
        // JSファイルの読み込みエラーを検知して自動リカバリ
        window.addEventListener('error', function(e) {
          if (e.message && e.message.includes('Failed to fetch dynamically imported module')) {
            console.log('[SW Recovery] Module load error detected, clearing caches...');
            caches.keys().then(function(names) {
              return Promise.all(names.map(function(name) {
                return caches.delete(name);
              }));
            }).then(function() {
              console.log('[SW Recovery] Caches cleared, reloading...');
              window.location.reload();
            });
          }
        });
        
        // 起動時に古いプリキャッシュを削除（workbox-precache-v2キャッシュ内のJSファイル）
        caches.keys().then(function(names) {
          names.forEach(function(name) {
            if (name.includes('precache')) {
              caches.open(name).then(function(cache) {
                cache.keys().then(function(requests) {
                  requests.forEach(function(request) {
                    if (request.url.endsWith('.js')) {
                      cache.delete(request);
                      console.log('[SW Cleanup] Removed precached JS:', request.url);
                    }
                  });
                });
              });
            }
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
